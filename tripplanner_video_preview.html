<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TripPlanner Video Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style id="tripplanner-video-hero-css">
.tripplanner-video-stage{
position:relative!important;
height:520px!important;
border-radius:34px!important;
overflow:hidden!important;
background:#F4F8FB!important;
border:1px solid rgba(222,231,239,.96)!important;
box-shadow:0 30px 90px rgba(10,35,60,.12)!important;
}
.tripplanner-video-stage video{
width:100%!important;
height:100%!important;
display:block!important;
object-fit:cover!important;
object-position:center center!important;
filter:brightness(1.04) saturate(1.02) contrast(1.01)!important;
}
.tripplanner-video-stage:after{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.05)),
linear-gradient(90deg,rgba(7,16,24,.12),rgba(7,16,24,.00) 45%,rgba(7,16,24,.04));
pointer-events:none;
z-index:2;
}
.tripplanner-video-label{
position:absolute;
left:24px;
bottom:22px;
z-index:3;
max-width:455px;
padding:17px 19px;
border-radius:22px;
background:rgba(255,255,255,.92);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.52);
box-shadow:0 18px 48px rgba(0,0,0,.12);
}
.tripplanner-video-label b{
display:block;
font-size:18px;
line-height:1.1;
letter-spacing:-.035em;
color:#071018;
margin-bottom:5px;
}
.tripplanner-video-label span{
display:block;
font-size:12px;
line-height:1.42;
color:#4E5C6B;
}
</style>


<!-- Google Analytics GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9L6TQF5E40"></script>
<script src="smartvel-ga4-tracking.js?v=20260518"></script>

</head>
<body style="margin:0;background:#f6f8fb;font-family:Poppins,Arial,sans-serif;padding:40px;">
<div style="max-width:900px;margin:auto;">

<div class="tripplanner-video-stage">
  <video autoplay muted loop playsinline preload="auto">
    <source src="tripplanner_hero_video.mp4" type="video/mp4">
  </video>
  <div class="tripplanner-video-label">
    <b>TripPlanner in action</b>
    <span>From discovery and filtering to saved points of interest and itinerary planning.</span>
  </div>
</div>

</div>
<script src="smartvel-campaign-config.js?v=20260517"></script>
</body>
</html>
