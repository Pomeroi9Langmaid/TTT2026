<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Logo ticker preview</title>
<style id="clean-below-logo-ticker-css">
.clean-logo-ticker{
position:relative;
z-index:2;
margin:24px 0 6px;
padding:8px 0 4px;
overflow:hidden;
background:transparent!important;
}
.clean-logo-title{
font-size:11px;
font-weight:900;
letter-spacing:.14em;
text-transform:uppercase;
color:#125885;
margin:0 0 13px;
}
.clean-logo-window{
overflow:hidden;
width:100%;
mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);
-webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);
}
.clean-logo-track{
display:flex;
align-items:center;
gap:34px;
width:max-content;
animation:cleanTickerMove 58s linear infinite;
}
.clean-logo-ticker:hover .clean-logo-track{
animation-play-state:paused;
}
.clean-logo{
height:62px;
min-width:154px;
display:flex;
align-items:center;
justify-content:center;
padding:8px 18px;
background:rgba(255,255,255,.38);
border:1px solid rgba(222,231,239,.46);
border-radius:18px;
box-shadow:0 8px 22px rgba(18,18,18,.035);
}
.clean-logo img{
display:block;
max-height:42px;
max-width:145px;
object-fit:contain;
}
.contact .clean-logo-ticker{
grid-column:1 / -1;
margin-top:26px;
}
.contact .clean-logo-title{
color:#D9EEF8;
}
.contact .clean-logo{
background:rgba(255,255,255,.86);
border-color:rgba(255,255,255,.2);
}
@keyframes cleanTickerMove{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}
</style>
