<!DOCTYPE html><html><head><meta charset="utf-8"><title>Logo ticker preview</title>
<style id="smartvel-proper-logo-ticker">
.client-logo-ticker{
position:relative;
z-index:3;
margin-top:18px;
border-radius:28px;
background:rgba(255,255,255,.94);
border:1px solid rgba(222,231,239,.9);
box-shadow:0 18px 54px rgba(18,18,18,.07);
overflow:hidden;
padding:18px 0 16px;
}
.client-logo-ticker:before,
.client-logo-ticker:after{
content:"";
position:absolute;
top:0;
bottom:0;
width:120px;
z-index:3;
pointer-events:none;
}
.client-logo-ticker:before{
left:0;
background:linear-gradient(90deg,rgba(255,255,255,.98),rgba(255,255,255,0));
}
.client-logo-ticker:after{
right:0;
background:linear-gradient(270deg,rgba(255,255,255,.98),rgba(255,255,255,0));
}
.client-logo-title{
font-size:12px;
font-weight:800;
letter-spacing:.12em;
text-transform:uppercase;
color:#125885;
padding:0 24px 12px;
}
.client-logo-track-wrap{
width:100%;
overflow:hidden;
}
.client-logo-track{
display:flex;
align-items:center;
gap:34px;
width:max-content;
animation:clientLogoMarquee 68s linear infinite;
}
.client-logo-ticker:hover .client-logo-track{
animation-play-state:paused;
}
.client-logo-item{
height:62px;
min-width:132px;
display:flex;
align-items:center;
justify-content:center;
padding:8px 18px;
border-radius:18px;
background:rgba(255,255,255,.86);
border:1px solid rgba(222,231,239,.65);
box-shadow:0 10px 26px rgba(18,18,18,.045);
}
.client-logo-item img{
max-height:42px;
max-width:150px;
object-fit:contain;
display:block;
}
@keyframes clientLogoMarquee{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}
.contact-client-logo-ticker{
position:relative;
z-index:4;
grid-column:1 / -1;
margin-top:20px;
}
.contact-client-logo-ticker .client-logo-ticker{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.14);
box-shadow:0 20px 70px rgba(0,0,0,.22);
}
.contact-client-logo-ticker .client-logo-title{
color:#D9EEF8;
}
.contact-client-logo-ticker .client-logo-ticker:before{
background:linear-gradient(90deg,rgba(8,17,27,.85),rgba(8,17,27,0));
}
.contact-client-logo-ticker .client-logo-ticker:after{
background:linear-gradient(270deg,rgba(8,17,27,.85),rgba(8,17,27,0));
}
.contact-client-logo-ticker .client-logo-item{
height:54px;
min-width:120px;
background:rgba(255,255,255,.92);
}
.contact-client-logo-ticker .client-logo-item img{
max-height:36px;
max-width:135px;
}
</style>
