<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Logo ticker preview</title>
<style id="clean-below-logo-ticker-css">
.clean-logo-ticker{
position:relative!important;
z-index:2!important;
margin:18px 0 4px!important;
padding:6px 0 2px!important;
overflow:hidden!important;
background:transparent!important;
}
.clean-logo-title{
font-size:10px!important;
font-weight:900!important;
letter-spacing:.14em!important;
text-transform:uppercase!important;
color:#125885!important;
margin:0 0 10px!important;
}
.clean-logo-window{
overflow:hidden!important;
width:100%!important;
mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)!important;
-webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)!important;
}
.clean-logo-track{
display:flex!important;
align-items:center!important;
gap:28px!important;
width:max-content!important;
animation:cleanTickerMove 56s linear infinite!important;
}
.clean-logo-ticker:hover .clean-logo-track{
animation-play-state:paused!important;
}
.clean-logo{
height:52px!important;
min-width:132px!important;
display:flex!important;
align-items:center!important;
justify-content:center!important;
padding:7px 14px!important;
background:rgba(255,255,255,.42)!important;
border:1px solid rgba(222,231,239,.38)!important;
border-radius:16px!important;
box-shadow:0 7px 20px rgba(18,18,18,.035)!important;
}
.clean-logo img{
display:block!important;
max-height:36px!important;
max-width:124px!important;
object-fit:contain!important;
}
.contact .clean-logo-ticker{
grid-column:1 / -1!important;
margin-top:24px!important;
}
.contact .clean-logo-title{
color:#D9EEF8!important;
}
.contact .clean-logo{
background:rgba(255,255,255,.86)!important;
border-color:rgba(255,255,255,.18)!important;
}
@keyframes cleanTickerMove{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}
</style>
</head>
