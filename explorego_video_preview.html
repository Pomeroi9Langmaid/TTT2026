<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore&Go Video Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style id="explorego-video-hero-css">
.explorego-video-stage{
position:relative!important;
height:520px!important;
border-radius:34px!important;
overflow:hidden!important;
background:#071018!important;
border:1px solid rgba(222,231,239,.95)!important;
box-shadow:0 30px 90px rgba(10,35,60,.16)!important;
}
.explorego-video-stage video{
width:100%!important;
height:100%!important;
display:block!important;
object-fit:cover!important;
object-position:center center!important;
filter:saturate(1.05) contrast(1.02)!important;
}
.explorego-video-stage:after{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(90deg,rgba(7,16,24,.42),rgba(7,16,24,.04) 45%,rgba(7,16,24,.12)),
linear-gradient(180deg,rgba(7,16,24,.10),rgba(7,16,24,.22));
pointer-events:none;
z-index:2;
}
.explorego-video-label{
position:absolute;
left:24px;
bottom:22px;
z-index:3;
max-width:430px;
padding:17px 19px;
border-radius:22px;
background:rgba(255,255,255,.88);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.34);
box-shadow:0 18px 48px rgba(0,0,0,.18);
}
.explorego-video-label b{
display:block;
font-size:18px;
line-height:1.1;
letter-spacing:-.035em;
color:#071018;
margin-bottom:5px;
}
.explorego-video-label span{
display:block;
font-size:12px;
line-height:1.42;
color:#4E5C6B;
}
</style>

<script src="smartvel-clarity-tracking.js?v=20260518"></script>
</head>
<body style="margin:0;background:#f6f8fb;font-family:Poppins,Arial,sans-serif;padding:40px;">
<div style="max-width:900px;margin:auto;">

<div class="explorego-video-stage">
  <video autoplay muted loop playsinline preload="auto">
    <source src="explorego_hero_video.mp4" type="video/mp4">
  </video>
  <div class="explorego-video-label">
    <b>Explore&Go in action</b>
    <span>Interactive destination discovery that helps travellers move from inspiration to intent.</span>
  </div>
</div>

</div>
</body>
</html>
